# Golf Swing Analyzer — runtime configuration
# All values here are user-editable; nothing in this list should be hardcoded
# elsewhere in the app (spec.md NFR4).

audio_trigger:
  # Mic device index to listen on. null = system default input, but that can
  # fail outright on some machines (seen: MME default erroring with "no
  # driver installed" even though the hardware itself worked fine via a
  # specific device index). Run `python -m golf_sim.audio.cli devices` to
  # list candidates and set an explicit index -- WASAPI-backed entries are
  # the most reliable bet on Windows.
  device: 14  # Microphone Array (AMD Audio Device), WASAPI -- verified working 2026-07-18
  # RMS/dB trigger threshold. TBD via calibration helper (Phase 2).
  threshold_db: -20.0
  # Seconds of footage to keep *before* the trigger in the saved clip.
  pre_capture_delay_s: 1.0
  # Fixed length of the saved clip, counted from (trigger - pre_capture_delay_s).
  capture_duration_s: 3.0
  # Ignore re-triggers for this many seconds after a capture starts.
  trigger_cooldown_s: 5.0

cameras:
  # Rolling buffer must cover at least capture_duration_s + this margin (not
  # just pre_capture_delay_s): it keeps accumulating post-trigger frames after
  # a trigger fires, so it must retain the whole window until extraction
  # finishes, not just the pre-trigger portion.
  buffer_margin_s: 1.0
  # camera_1 = down-the-line (behind golfer), camera_2 = face-on (side).
  # Selected by DirectShow device NAME, not index -- Windows shuffles camera
  # indices between processes (seen live: a swing recorded from the laptop
  # webcam because the rig camera's index moved). `id` is only the fallback
  # when no name is set. The laptop's own "HP True Vision FHD Camera" is
  # deliberately not used.
  devices:
    - id: 0
      name: PC Camera
      role: camera_1
      width: 1280
      height: 720
      fps: 60
    - id: 2
      name: HD USB Camera
      role: camera_2
      width: 1280
      height: 720
      fps: 60

pose:
  # Pose2Sim settings (spec.md §4.3; OQ2 resolved -- RTMPose via Pose2Sim).
  # pose_model 'Body_with_feet' = HALPE_26 keypoints, Pose2Sim's default.
  pose_model: Body_with_feet
  # RTMlib accuracy/speed tradeoff: lightweight / balanced / performance.
  mode: balanced
  # Write an overlay video per camera (landmarks drawn on frames) for QA.
  save_debug_video: true

calibration:
  # Directory holding the rig's calibration result (Calib*.toml, Pose2Sim
  # format) plus the source checkerboard footage it was computed from. The
  # rig is calibrated once and reused across sessions; recalibrate whenever
  # a camera moves (spec.md assumption).
  dir: config/calibration
  # Flag "recalibration recommended" if the calibration file is older than
  # this many days (cameras drift/get bumped over time).
  max_age_days: 60
  # Checkerboard used for calibration: inner-corner count [rows, cols] and
  # square size in mm. Defaults match Pose2Sim's demo board.
  checkerboard_corners: [4, 7]
  checkerboard_square_size_mm: 60

metrics:
  # Per-metric reference ranges; edit freely. Units in degrees unless noted.
  # Metrics without a range here are still computed, just never flagged.
  reference_ranges:
    shoulder_turn_deg: { min: 80, max: 100 }
    hip_turn_deg: { min: 40, max: 55 }
    spine_tilt_deg: { min: 25, max: 40 }
    x_factor_deg: { min: 30, max: 45 }
    tempo_ratio: { min: 2.8, max: 3.2 }
    # Lateral hip sway as % of stance width, relative to address.
    hip_sway_top_pct: { min: 0, max: 30 }
    hip_sway_impact_pct: { min: 0, max: 40 }

processing:
  # Automatically run the full analysis pipeline (2D pose -> 3D -> metrics ->
  # tips) on every capture, so results are waiting without pressing "process
  # swing" in the UI. Sessions process one at a time in the background;
  # capture keeps working while processing runs. Turn off to batch-process
  # later (e.g. if the machine struggles between shots).
  auto_process: true

storage:
  data_dir: data
  db_file: data/sessions.db

api:
  host: 127.0.0.1
  port: 8765
